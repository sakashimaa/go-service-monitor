networks:
  monitor-network:
    driver: bridge

volumes:
  pg_data:

services:
  postgres:
    image: postgres:17-alpine
    container_name: monitor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # пробрасываем порт базы для удобства разработки (в проде убираем наглухо)
    ports:
      - "5432:5432"
    networks:
      - monitor-network
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monitor-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - monitor-network
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    # Пробрасываем локальную папку ./configs внутрь контейнера чтоб он подхватывался без перезапуска. :ro означает readonly
    # Чтоб приложене случайно не затерло конфиг
    volumes:
      - ./configs:/app/configs:ro